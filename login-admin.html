<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>KapitalVoice — Вход для администратора</title>
<link rel="icon" id="favicon" href="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="kapitalvoice.css">
</head>
<body>

<!-- ===== ВХОД АДМИНИСТРАТОРА (логин + пароль) ===== -->
<div class="screen on" id="screen-admin-auth">
  <div class="aw">
    <div class="ac">
      <div class="ah">
        <img class="ali" id="logo-img" src="" alt="KB">
        <div>
          <div class="abn">KapitalVoice</div>
          <div class="abs">Вход для администратора</div>
        </div>
      </div>
      <div class="abody">
        <label class="fl">Логин</label>
        <input class="fi" id="adm-login" type="text" placeholder="admin" autocomplete="username">
        <label class="fl">Пароль</label>
        <input class="fi" id="adm-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        <div class="err" id="adm-err"></div>
        <button class="bny" onclick="doAdminLogin()">&#128737; Войти как администратор</button>
        <div class="admin-link">
          <a class="tl2" href="index.html">&#8592; Назад к обычному входу</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script>
document.getElementById('logo-img').src = KV_LOGO;
document.getElementById('favicon').href = KV_LOGO;
kvInitTheme();

(function(){
  var me = kvGetMe();
  if (me) {
    window.location.href = me.role === 'admin' ? 'admin.html' : 'forms.html';
  }
})();

function doAdminLogin() {
  var login = document.getElementById('adm-login').value.trim();
  var pass = document.getElementById('adm-pass').value;
  var err = document.getElementById('adm-err');
  err.textContent = '';
  if (!login || !pass) { err.textContent = 'Заполните логин и пароль'; return; }

  sbFetch('kv_users?login=eq.' + encodeURIComponent(login) + '&pass=eq.' + encodeURIComponent(pass) + '&role=eq.admin&select=*')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d || !d.length) { err.textContent = 'Неверный логин или пароль'; return; }
      kvSetMe(d[0]);
      window.location.href = 'admin.html';
    })
    .catch(function() { err.textContent = 'Ошибка соединения с базой данных'; });
}

document.getElementById('adm-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
